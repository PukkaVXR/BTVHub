<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTV Chat Chaos Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      html,
      body {
        background: transparent;
        height: 100%;
        margin: 0;
        overflow: hidden;
        width: 100%;
      }

      body {
        align-items: flex-end;
        display: flex;
        justify-content: flex-end;
      }

      .chaos {
        background: rgba(8, 11, 18, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 22px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38), 0 0 42px color-mix(in srgb, var(--chaos-color) 32%, transparent);
        box-sizing: border-box;
        color: white;
        display: grid;
        gap: 12px;
        margin: 42px;
        max-width: min(540px, calc(100vw - 84px));
        opacity: 0;
        padding: 18px;
        transform: translateX(24px) scale(0.98);
        transition: opacity 220ms ease, transform 220ms ease;
        width: 500px;
      }

      .chaos.visible {
        opacity: 1;
        transform: translateX(0) scale(1);
      }

      .chaos.chaotic,
      .chaos.meltdown {
        animation: chaosGlow 900ms ease-in-out infinite alternate;
      }

      .chaos-header {
        align-items: start;
        display: flex;
        gap: 14px;
        justify-content: space-between;
      }

      .chaos-kicker {
        color: rgba(255, 255, 255, 0.62);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .chaos-title {
        font-size: clamp(26px, 4vw, 42px);
        font-weight: 1000;
        letter-spacing: -0.03em;
        line-height: 0.98;
        margin-top: 4px;
      }

      .chaos-status {
        background: color-mix(in srgb, var(--chaos-color) 24%, rgba(255, 255, 255, 0.08));
        border: 1px solid color-mix(in srgb, var(--chaos-color) 48%, rgba(255, 255, 255, 0.16));
        border-radius: 999px;
        font-size: 12px;
        font-weight: 950;
        padding: 8px 10px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .chaos-meter {
        background: rgba(255, 255, 255, 0.09);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        height: 36px;
        overflow: hidden;
        position: relative;
      }

      .chaos-fill {
        background: linear-gradient(90deg, var(--chaos-color), #ff5a67);
        box-shadow: 0 0 32px color-mix(in srgb, var(--chaos-color) 62%, transparent);
        inset: 0 auto 0 0;
        position: absolute;
        transition: width 280ms ease;
        width: var(--chaos-percent);
      }

      .chaos-meter strong {
        display: grid;
        font-size: 14px;
        font-variant-numeric: tabular-nums;
        font-weight: 1000;
        inset: 0;
        place-items: center;
        position: absolute;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.62);
      }

      .chaos-footer {
        color: rgba(255, 255, 255, 0.64);
        display: flex;
        font-size: 12px;
        font-weight: 900;
        justify-content: space-between;
        text-transform: uppercase;
      }

      @keyframes chaosGlow {
        from {
          box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38), 0 0 36px color-mix(in srgb, var(--chaos-color) 42%, transparent);
        }

        to {
          box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38), 0 0 76px color-mix(in srgb, var(--chaos-color) 78%, transparent);
        }
      }
    </style>
  </head>
  <body>
    <main class="chaos" id="chaos">
      <section class="chaos-header">
        <div>
          <div class="chaos-kicker" id="subtitle">Energy meter</div>
          <div class="chaos-title" id="title">Chat Chaos</div>
        </div>
        <div class="chaos-status" id="status">Calm</div>
      </section>
      <section class="chaos-meter" aria-live="polite">
        <div class="chaos-fill"></div>
        <strong id="value">0%</strong>
      </section>
      <section class="chaos-footer">
        <span id="level">0 / 100</span>
        <span id="decay">Decay 5/min</span>
      </section>
    </main>

    <script>
      const chaos = document.getElementById("chaos");
      const subtitle = document.getElementById("subtitle");
      const title = document.getElementById("title");
      const status = document.getElementById("status");
      const value = document.getElementById("value");
      const level = document.getElementById("level");
      const decay = document.getElementById("decay");

      function statusLabel(statusValue) {
        if (statusValue === "meltdown") return "Meltdown";
        if (statusValue === "chaotic") return "Chaotic";
        if (statusValue === "building") return "Building";
        return "Calm";
      }

      function render(state) {
        const threshold = Math.max(1, Number(state.threshold || 100));
        const current = Math.max(0, Math.min(threshold, Number(state.level || 0)));
        const percent = Math.round((current / threshold) * 100);
        chaos.className = `chaos ${state.status || "calm"}${state.visible ? " visible" : ""}`;
        chaos.style.setProperty("--chaos-color", state.color || "#f59e0b");
        chaos.style.setProperty("--chaos-percent", `${percent}%`);
        subtitle.textContent = state.subtitle || "Energy meter";
        title.textContent = state.title || "Chat Chaos";
        status.textContent = statusLabel(state.status);
        value.textContent = `${percent}%`;
        level.textContent = `${current} / ${threshold}`;
        decay.textContent = `Decay ${Math.max(0, Number(state.decayPerMinute || 0))}/min`;
      }

      async function poll() {
        try {
          const response = await fetch("/api/chat-chaos", { cache: "no-store" });
          if (!response.ok) throw new Error("Chaos meter unavailable");
          render(await response.json());
        } catch {
          chaos.classList.remove("visible");
        }
      }

      void poll();
      setInterval(poll, 1500);
    </script>
  </body>
</html>
