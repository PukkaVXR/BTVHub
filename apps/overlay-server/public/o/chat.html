<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BTV Chat</title>
  <link rel="stylesheet" href="/styles/overlay.css" />
</head>
<body>
  <div class="chat-widget">
    <div id="chat-stats" class="chat-live-stats" hidden></div>
    <div id="chat-messages"></div>
  </div>
  <script type="module">
    import "/js/overlay-theme.js";
    import { OverlayClient } from "/js/overlay-client.js";

    let maxMessages = 20;
    let fadeMs = 8000;
    let showStats = true;
    const bttvEmotes = new Map();
    const twitchBadges = new Map();
    const fadeStartMs = () => Math.max(0, fadeMs - 1000);

    try {
      const cfg = await fetch("/api/widgets/chat-config").then((r) => r.json());
      maxMessages = Number(cfg.maxMessages) || 20;
      fadeMs = Number(cfg.fadeMs) || 8000;
      showStats = cfg.showStats !== false;
    } catch {
      /* defaults */
    }

    void loadBttvEmotes();
    void loadTwitchBadges();

    const box = document.getElementById("chat-messages");
    const statsBox = document.getElementById("chat-stats");
    const client = new OverlayClient({
      channels: ["chat"],
      onMessage: (msg) => {
        if (msg.kind === "chat:stats") {
          renderChatStats(msg.stats);
          return;
        }
        if (msg.kind !== "chat:message") return;
        const el = document.createElement("div");
        el.className = "chat-line";
        const m = msg.message;
        const userStyle = m.color ? ` style="color:${escapeAttr(m.color)}"` : "";
        el.innerHTML = `${renderBadges(m.badges)}<span class="chat-user"${userStyle}>${escapeHtml(m.user.displayName)}:</span> <span class="chat-message-text">${renderChatText(m.text)}</span>`;
        if (m.user.id === "btv-effect") el.classList.add("chat-system");
        box.appendChild(el);
        while (box.children.length > maxMessages) box.firstChild?.remove();
        setTimeout(() => el.classList.add("fade-out"), fadeStartMs());
        setTimeout(() => el.remove(), fadeMs);
      },
    });
    client.connect();

    function renderChatStats(stats) {
      if (!showStats || !statsBox) return;
      statsBox.hidden = false;
      const active = Number(stats.activeChatters ?? 0);
      const rate = Number(stats.messagesPerMinute ?? 0);
      statsBox.textContent = `${rate}/min • ${active} active chatter${active === 1 ? "" : "s"}`;
    }

    async function loadBttvEmotes() {
      try {
        const health = await fetch("/api/health", { cache: "no-store" }).then((r) => r.json());
        const twitchUserId = health?.twitch?.userId;
        const refreshedAt = Date.now();
        const urls = [withCacheBust("https://api.betterttv.net/3/cached/emotes/global", refreshedAt)];
        if (twitchUserId) urls.push(withCacheBust(`https://api.betterttv.net/3/cached/users/twitch/${encodeURIComponent(twitchUserId)}`, refreshedAt));
        const results = await Promise.allSettled(urls.map((url) => fetch(url, { cache: "no-store" }).then((r) => r.ok ? r.json() : null)));
        for (const result of results) {
          if (result.status !== "fulfilled" || !result.value) continue;
          const payload = result.value;
          const emotes = Array.isArray(payload)
            ? payload
            : [...(payload.channelEmotes ?? []), ...(payload.sharedEmotes ?? [])];
          for (const emote of emotes) {
            if (!emote?.id || !emote?.code) continue;
            bttvEmotes.set(String(emote.code), {
              code: String(emote.code),
              url: `https://cdn.betterttv.net/emote/${encodeURIComponent(String(emote.id))}/2x`,
            });
          }
        }
      } catch {
        /* BTTV is optional; text chat should keep working. */
      }
    }

    async function loadTwitchBadges() {
      try {
        const payload = await fetch("/api/widgets/chat-badges", { cache: "no-store" }).then((r) => r.ok ? r.json() : null);
        for (const [setId, versions] of Object.entries(payload?.badges ?? {})) {
          if (!versions || typeof versions !== "object") continue;
          for (const [id, badge] of Object.entries(versions)) {
            if (!badge || typeof badge !== "object") continue;
            const imageUrl = String(badge.imageUrl ?? "");
            if (!imageUrl) continue;
            twitchBadges.set(`${setId}:${id}`, {
              title: String(badge.title ?? setId),
              imageUrl,
            });
          }
        }
      } catch {
        /* Badge images are decorative; chat text should keep working. */
      }
    }

    function withCacheBust(url, refreshedAt) {
      const next = new URL(url);
      next.searchParams.set("_btvRefresh", String(refreshedAt));
      return next.toString();
    }

    function renderChatText(text) {
      return String(text ?? "")
        .split(/(\s+)/)
        .map((part) => {
          if (!part || /^\s+$/.test(part)) return escapeHtml(part);
          const emote = bttvEmotes.get(part);
          if (!emote) return escapeHtml(part);
          return `<img class="chat-emote chat-emote-bttv" src="${escapeAttr(emote.url)}" alt="${escapeAttr(emote.code)}" title="${escapeAttr(emote.code)}" />`;
        })
        .join("");
    }

    function renderBadges(badges) {
      if (!Array.isArray(badges) || !badges.length) return "";
      const html = badges
        .map((badge) => {
          const normalized = normalizeBadge(badge);
          if (!normalized) return "";
          const meta = twitchBadges.get(`${normalized.setId}:${normalized.id}`);
          const label = meta?.title ?? `${normalized.setId} ${normalized.id}`;
          if (!meta?.imageUrl) {
            return `<span class="chat-badge chat-badge-fallback" title="${escapeAttr(label)}">${escapeHtml(normalized.setId.slice(0, 1).toUpperCase())}</span>`;
          }
          return `<img class="chat-badge" src="${escapeAttr(meta.imageUrl)}" alt="${escapeAttr(label)}" title="${escapeAttr(label)}" />`;
        })
        .filter(Boolean)
        .join("");
      return html ? `<span class="chat-badges">${html}</span>` : "";
    }

    function normalizeBadge(badge) {
      if (typeof badge === "string") {
        const [setId, id] = badge.split("/");
        return setId && id ? { setId, id } : null;
      }
      if (!badge || typeof badge !== "object") return null;
      const setId = String(badge.setId ?? badge.set_id ?? "");
      const id = String(badge.id ?? "");
      return setId && id ? { setId, id } : null;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
</body>
</html>
