<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BTV Ticker</title>
  <link rel="stylesheet" href="/styles/overlay.css" />
</head>
<body>
  <div class="ticker-widget">
    <h3>Recent Events</h3>
    <ul id="ticker-list"></ul>
  </div>
  <script type="module">
    import { OverlayClient } from "/js/overlay-client.js";
    const list = document.getElementById("ticker-list");
    let maxEvents = 15;
    try {
      const cfg = await fetch("/api/widgets/ticker-config").then((r) => r.json());
      maxEvents = Number(cfg.maxEvents) || 15;
    } catch { /* default */ }
    const labels = { follow: "Follow", sub: "Sub", cheer: "Cheer", raid: "Raid", gift_sub: "Gift Sub" };
    const client = new OverlayClient({
      channels: ["ticker"],
      onMessage: (msg) => {
        if (msg.kind !== "ticker:event") return;
        const li = document.createElement("li");
        const ev = msg.event;
        li.textContent = `${labels[ev.type] || ev.type}: ${ev.user?.displayName || "Someone"}`;
        list.prepend(li);
        while (list.children.length > maxEvents) list.lastChild?.remove();
      },
    });
    client.connect();
  </script>
</body>
</html>
